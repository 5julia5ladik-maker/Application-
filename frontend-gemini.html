<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeStock Gemini</title>
  <style>
    :root{--bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,.08);--text:#0d0c0b;--muted:rgba(13,12,11,.56);--black:#0d0c0b;--r:20px}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
    .shell{max-width:420px;margin:0 auto;min-height:100vh;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
    h1{font-size:28px;margin:10px 0 18px}
    .muted{color:var(--muted);font-size:13px;line-height:1.4}
    .btn,.file-label{display:block;width:100%;border:none;background:var(--black);color:#fff;padding:16px;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;text-align:center}
    .file-label{margin-top:16px}
    input[type=file]{display:none}
    .preview{margin-top:16px;border-radius:16px;overflow:hidden;background:#eceae4;min-height:180px;display:flex;align-items:center;justify-content:center}
    .preview img{width:100%;display:block}
    .grid{display:grid;gap:10px;margin-top:16px}
    .row{background:#faf9f6;border:1px solid var(--border);border-radius:14px;padding:12px 14px}
    .label{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:700}
    .value{font-size:15px;font-weight:700}
    .status{margin-top:14px;font-size:14px}
  </style>
</head>
<body>
  <div class="shell">
    <h1>HomeStock AI</h1>
    <div class="card">
      <div class="muted">Загрузи фото товара. Backend отправит его в Gemini API и вернёт продукт, бренд, место хранения и описание.</div>
      <label class="file-label">Выбрать фото
        <input id="file" type="file" accept="image/*">
      </label>
      <div class="preview" id="preview">Фото ещё не выбрано</div>
      <button class="btn" id="send" style="margin-top:16px">Распознать</button>
      <div class="status" id="status">Готово к работе</div>
      <div class="grid">
        <div class="row"><div class="label">Продукт</div><div class="value" id="product">—</div></div>
        <div class="row"><div class="label">Бренд</div><div class="value" id="brand">—</div></div>
        <div class="row"><div class="label">Место</div><div class="value" id="place">—</div></div>
        <div class="row"><div class="label">Описание</div><div class="value" id="extra">—</div></div>
        <div class="row"><div class="label">Количество</div><div class="value" id="total">—</div></div>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    let currentFile = null;

    fileInput.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      currentFile = file;
      const reader = new FileReader();
      reader.onload = ev => {
        preview.innerHTML = '<img src="' + ev.target.result + '" alt="">';
      };
      reader.readAsDataURL(file);
      statusEl.textContent = 'Фото выбрано';
    };

    document.getElementById('send').onclick = async () => {
      if(!currentFile){
        statusEl.textContent = 'Сначала выбери фото';
        return;
      }

      statusEl.textContent = 'Распознаю...';
      const fd = new FormData();
      fd.append('file', currentFile);

      try{
        const res = await fetch('http://127.0.0.1:8000/recognize', {
          method: 'POST',
          body: fd
        });
        const data = await res.json();

        if(!res.ok){
          statusEl.textContent = typeof data.error === 'string' ? data.error : 'Ошибка backend';
          return;
        }

        document.getElementById('product').textContent = data.product || '—';
        document.getElementById('brand').textContent = data.brand || '—';
        document.getElementById('place').textContent = data.place || '—';
        document.getElementById('extra').textContent = data.extra || '—';
        document.getElementById('total').textContent = data.total || '—';
        statusEl.textContent = 'Готово';
      }catch(e){
        statusEl.textContent = 'Не удалось подключиться к backend';
      }
    };
  </script>
</body>
</html>
